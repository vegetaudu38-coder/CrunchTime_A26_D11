<script>
const entreprise = document.getElementById("entreprise");
const universite = document.getElementById("universite");

// logique JS
entreprise.addEventListener("input", () => {
    if (entreprise.value.length > 0) {
        universite.value = "";
        universite.disabled = true;
    } else {
        universite.disabled = false;
    }
});

universite.addEventListener("input", () => {
    if (universite.value.length > 0) {
