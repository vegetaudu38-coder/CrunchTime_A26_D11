<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#f5f7fa;
}

#BandeMenuHaut {
    position: fixed;
    top:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(90deg,#002d80,#0052cc);
}

#MenuRubriques li {
    display:inline-block;
    margin:0 10px;
    list-style:none;
}

#MenuRubriques a {
    padding:10px 20px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.15);
}

main {
    margin-top:90px;
    padding:20px;
}

.chat-box {
    max-width:800px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:20px;
    height:400px;
    overflow-y:auto;
}

.message {
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    background:#e9efff;
}

.message strong {
    color:#002d80;
}

.form {
    max-width:800px;
    margin:20px auto;
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:50px;
    background: linear-gradient(90deg,#002d80,#0052cc);
    color:white;
}
</style>
</head>

<body>

<body>
<div id="BandeMenuHaut">
<ul id="MenuRubriques">
<li><a href="Upsided.html">Accueil</a></li>
<li><a href="Partenaires.html" id="current">Partenaires</a></li>
<li><a href="connexion.html">connexion</a></li>
<li><a href="chat.html">chat</a></li>
</ul>
</div>

<main>

<div class="chat-box" id="chat">

    <div class="message">
        <strong></strong> :
        
    </div>

</div>

<form class="form" method="POST">
    <input type="text" name="message" placeholder="Écrire un message..." required>
    <button type="submit">Envoyer</button>
</form>

</main>

<script>
// auto refresh toutes les 2 secondes
setInterval(() => {
    fetch("chat.php")
        .then(res => res.text())
        .then(data => {
            let parser = new DOMParser();
            let doc = parser.parseFromString(data, "text/html");
            document.getElementById("chat").innerHTML =
                doc.getElementById("chat").innerHTML;
        });
}, 2000);
</script>

</body>
</html>
